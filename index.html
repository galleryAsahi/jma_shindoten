<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3352;
    --accent: #4f8ef7;
    --accent2: #e05c5c;
    --text: #e8eaf6;
    --muted: #8892b0;
    --font: 'BIZ UDGothic', 'Noto Sans JP', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ヘッダー */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; z-index: 1000; flex-shrink: 0; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: .05em; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; font-size: 12px; }
  .controls { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; align-items: center; }
  input[type=text], select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: var(--font);
    outline: none; transition: border-color .2s;
  }
  input[type=text] { flex: 1; min-width: 160px; }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select { min-width: 100px; cursor: pointer; }
  .count-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .count-badge b { color: var(--accent); }

  /* メインレイアウト */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* 地図 */
  #map { flex: 1; background: #141824; }

  /* テーブルパネル */
  .panel { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); overflow: hidden; }
  .panel-head { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0; }
  .panel-head table { width: 100%; border-collapse: collapse; }
  .panel-head th { padding: 9px 10px; font-size: 11px; font-weight: 600; color: var(--muted); text-align: left; cursor: pointer; user-select: none; white-space: nowrap; letter-spacing: .04em; }
  .panel-head th:hover { color: var(--text); }
  .panel-head th.active { color: var(--accent); }
  .table-body { overflow-y: auto; flex: 1; }
  .table-body::-webkit-scrollbar { width: 4px; }
  .table-body::-webkit-scrollbar-track { background: var(--surface); }
  .table-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .trow { display: grid; grid-template-columns: 105px 1fr 60px 65px; align-items: center; padding: 7px 10px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; font-size: 12px; gap: 4px; }
  .trow:hover { background: var(--surface2); }
  .trow.selected { background: #1e2d4a; border-left: 3px solid var(--accent); }
  .trow .region { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trow .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .trow .coord { font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted); text-align: right; }

  /* ポップアップ */
  .leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.6); color: var(--text); }
  .leaflet-popup-tip { background: var(--surface); }
  .leaflet-popup-content { margin: 12px 16px; min-width: 200px; }
  .popup-name { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .popup-region { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .popup-addr { font-size: 12px; color: var(--text); line-height: 1.5; }
  .popup-coord { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: monospace; }

  /* トースト */
  .no-result { display: flex; align-items: center; justify-content: center; height: 120px; color: var(--muted); font-size: 13px; }
</style>
</head>

// [region, name, lat, lon, address]
const DATA = RAW.map(r => ({
  region: r[0], name: r[1], lat: r[2], lon: r[3], address: r[4],
  major: getMajor(r[0])
}));

function getMajor(r) {
  if (['石狩','渡島','檜山','後志','空知','上川','留萌','宗谷','網走','北見','紋別','胆振','日高','十勝','釧路','根室','北海道'].some(x=>r.includes(x))) return '北海道';
  if (['青森','岩手','宮城','秋田','山形','福島'].some(x=>r.includes(x))) return '東北';
  if (['茨城','栃木','群馬','埼玉','千葉','東京','神奈川','山梨','長野'].some(x=>r.includes(x))) return '関東・甲信';
  if (['新潟','富山','石川','福井'].some(x=>r.includes(x))) return '北陸';
  if (['岐阜','静岡','愛知','三重'].some(x=>r.includes(x))) return '東海';
  if (['滋賀','京都','大阪','兵庫','奈良','和歌山'].some(x=>r.includes(x))) return '近畿';
  if (['鳥取','島根','岡山','広島','山口'].some(x=>r.includes(x))) return '中国';
  if (['徳島','香川','愛媛','高知'].some(x=>r.includes(x))) return '四国';
  if (['福岡','佐賀','長崎','熊本','大分','宮崎','鹿児島'].some(x=>r.includes(x))) return '九州';
  if (r.includes('沖縄')) return '沖縄';
  return 'その他';
}

// --- Leaflet 地図初期化 ---
const map = L.map('map', { center: [36.5, 137], zoom: 5, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

// マーカー色
const DOT_NORMAL = '#4f8ef7';
const DOT_SELECTED = '#e05c5c';

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="${color}" stroke="#fff" stroke-width="1.2"/></svg>`,
    iconSize: [10,10], iconAnchor: [5,5], popupAnchor: [0,-8]
  });
}

let markers = [];
let markerLayer = L.layerGroup().addTo(map);
let selectedIdx = null;

function buildPopup(d) {
  return `<div class="popup-name">${d.name}</div>
          <div class="popup-region">${d.region}</div>
          <div class="popup-addr">${d.address}</div>
          <div class="popup-coord">緯度 ${d.lat.toFixed(4)} / 経度 ${d.lon.toFixed(4)}</div>`;
}

// --- フィルタ＆描画 ---
let sortKey = 'region', sortDir = 1;
let filtered = [];

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const mj = document.getElementById('major').value;
  return DATA.filter(d =>
    (!q || d.name.includes(q) || d.region.includes(q) || d.address.includes(q)) &&
    (!mj || d.major === mj)
  );
}

function render() {
  filtered = getFiltered();
  filtered.sort((a,b) => {
    let va = a[sortKey], vb = b[sortKey];
    return typeof va === 'string' ? va.localeCompare(vb,'ja') * sortDir : (va - vb) * sortDir;
  });

  document.getElementById('cnt').textContent = filtered.length;

  // テーブル描画
  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<div class="no-result">該当する観測点がありません</div>';
  } else {
    tbody.innerHTML = filtered.map((d, i) => `
      <div class="trow ${d._selected ? 'selected' : ''}" onclick="selectStation(${i})" data-i="${i}">
        <div class="region" title="${d.region}">${d.region}</div>
        <div class="name" title="${d.name}">${d.name}</div>
        <div class="coord">${d.lat.toFixed(3)}</div>
        <div class="coord">${d.lon.toFixed(3)}</div>
      </div>`).join('');
  }

  // マーカー再描画
  markerLayer.clearLayers();
  markers = filtered.map((d, i) => {
    const m = L.marker([d.lat, d.lon], { icon: makeIcon(DOT_NORMAL) })
      .bindPopup(buildPopup(d), { maxWidth: 260 })
      .on('click', () => selectStation(i));
    markerLayer.addLayer(m);
    return m;
  });

  updateSort();
}

function selectStation(i) {
  const d = filtered[i];
  if (!d) return;

  // マーカー色リセット
  markers.forEach((m, j) => m.setIcon(makeIcon(j === i ? DOT_SELECTED : DOT_NORMAL)));

  // 地図移動
  map.setView([d.lat, d.lon], Math.max(map.getZoom(), 10), {animate: true});
  markers[i].openPopup();

  // テーブルハイライト
  document.querySelectorAll('.trow').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
    if (j === i) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  render();
}

function updateSort() {
  ['region','name','lat','lon'].forEach(k => {
    const el = document.getElementById('h-' + k);
    if (!el) return;
    el.classList.toggle('active', sortKey === k);
    el.textContent = {region:'地域',name:'観測点名',lat:'緯度',lon:'経度'}[k] + (sortKey===k ? (sortDir>0?' ↑':' ↓') : ' ↕');
  });
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('major').addEventListener('change', render);

render();
</script>
