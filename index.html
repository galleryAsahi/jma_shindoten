<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>震度観測点マップ｜気象庁・防災科研・地方公共団体</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;--border:#30363d;
  --accent:#58a6ff;--jma:#ff6b55;--nied:#5b9bd5;--local:#3cb044;--unknown:#8b949e;
  --text:#e6edf3;--muted:#8b949e;
  --font:'Noto Sans JP',sans-serif;
  --row-h:42px; /* JS の ROW_H と必ず一致させる */
}
/* OSをまたいでフォントレンダリングを統一 */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.4;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ヘッダー */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;z-index:1000}
.logo{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:.03em}
.logo small{color:var(--muted);font-weight:400;font-size:11px;margin-left:6px}
.controls{display:flex;gap:6px;flex:1;flex-wrap:wrap;align-items:center}
input[type=text],select{background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
input[type=text]{flex:1;min-width:150px}
input[type=text]:focus,select:focus{border-color:var(--accent)}
select{cursor:pointer}
.badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{display:flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:12px;border:1px solid;white-space:nowrap;cursor:pointer;transition:opacity .15s;user-select:none}
.badge.off{opacity:.35}
.badge-jma{color:var(--jma);border-color:var(--jma);background:rgba(88,166,255,.08)}
.badge-nied{color:var(--nied);border-color:var(--nied);background:rgba(63,185,80,.08)}
.badge-local{color:var(--local);border-color:var(--local);background:rgba(247,129,102,.08)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-jma{background:var(--jma)}
.dot-nied{background:var(--nied)}
.dot-local{background:var(--local)}
.cnt-wrap{font-size:12px;color:var(--muted);white-space:nowrap;padding:4px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:14px}
.cnt-wrap b{color:var(--text)}

/* レイアウト */
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:#0d1117}

/* パネル */
.panel{width:400px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surf);overflow:hidden}
.panel-head{background:var(--surf2);border-bottom:1px solid var(--border);padding:7px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ph-label{font-size:11px;color:var(--muted);white-space:nowrap}
.ph-select{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--font);outline:none;cursor:pointer;transition:border-color .15s}
.ph-select:focus{border-color:var(--accent)}
.ph-dir{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font);cursor:pointer;user-select:none;white-space:nowrap;transition:background .15s}
.ph-dir:hover{background:var(--surf2);border-color:var(--accent)}
.ph-sep{flex:1}
.ph-toggle{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:background .15s}
.ph-toggle:hover{background:var(--surf2);border-color:var(--accent)}
.table-body{overflow-y:auto;flex:1}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.trow{display:grid;grid-template-columns:16px 1fr 48px 54px 52px 54px;align-items:center;height:var(--row-h);padding:0 8px;border-bottom:1px solid var(--border);cursor:pointer;gap:4px;font-size:12px;transition:background .1s}
.trow:hover{background:var(--surf2)}
.trow.selected{background:#1c2d3a;border-left:3px solid var(--accent)}
.trow .tname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.trow .tregion{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:10px;grid-column:2;margin-top:-2px}
.trow .tcoord{font-family:var(--font);font-size:10px;color:var(--muted);text-align:right}
.trow .taffi{font-size:10px;text-align:center;padding:1px 4px;border-radius:3px;white-space:nowrap}
.trow .tstart{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap}
.af-jma{color:var(--jma)}
.af-nied{color:var(--nied)}
.af-local{color:var(--local)}
.trow-inner{display:contents}
.no-result{display:flex;align-items:center;justify-content:center;height:100px;color:var(--muted);font-size:13px}

/* ポップアップ */
.leaflet-popup-content-wrapper{background:var(--surf);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);color:var(--text)}
.leaflet-popup-tip{background:var(--surf)}
.leaflet-popup-content{margin:12px 14px;min-width:190px}
.pop-name{font-size:13px;font-weight:700;margin-bottom:2px}
.pop-region{font-size:11px;color:var(--muted);margin-bottom:6px}
.pop-addr{font-size:11px;line-height:1.5;color:var(--text)}
.pop-coord{font-size:10px;color:var(--muted);margin-top:5px;font-family:var(--font)}
.pop-affi{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-top:5px;border:1px solid}
</style>
</head>
<body>

<header>
  <div class="logo">震度観測点マップ<small>気象庁 / 防災科研 / 地方公共団体</small></div>
  <input type="text" id="search" placeholder="観測点名・地域で検索..." style="flex:1;min-width:140px;background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:13px;font-family:var(--font);outline:none">
  <div class="badges">
    <div class="badge badge-jma" onclick="toggleAffi('気象庁')" id="b-jma"><div class="dot dot-jma"></div>気象庁</div>
    <div class="badge badge-nied" onclick="toggleAffi('防災科研')" id="b-nied"><div class="dot dot-nied"></div>防災科研</div>
    <div class="badge badge-local" onclick="toggleAffi('地方公共団体')" id="b-local"><div class="dot dot-local"></div>地方</div>
  </div>
  <div class="cnt-wrap">表示 <b id="cnt">0</b> / <b id="total">0</b> 件</div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="panel">
    <div class="panel-head">
      <select class="ph-select" id="sort-key" onchange="onSortKeyChange(this.value)">
        <option value="name">観測点名順</option>
        <option value="lat">緯度順</option>
        <option value="lon">経度順</option>
        <option value="start">設置時期順</option>
      </select>
      <button class="ph-toggle" id="sub-dir" onclick="onSortDirToggle()">↑ 昇順</button>
      <div class="ph-sep"></div>
      <select class="ph-select" id="sub-major" onchange="onMajorChange(this.value)">
        <option value="">全地方</option>
        <option>北海道</option><option>東北</option><option>関東・甲信</option>
        <option>北陸</option><option>東海</option><option>近畿</option>
        <option>中国</option><option>四国</option><option>九州</option><option>沖縄</option>
      </select>
      <select class="ph-select" id="sub-display" onchange="onDisplayChange(this.value)">
        <option value="all">すべて</option>
        <option value="surface">地上のみ</option>
        <option value="seafloor">海底のみ</option>
      </select>
    </div>
    <div class="table-body" id="tbody"></div>
  </div>
</div>

    }
  }
  return bestD <= THRESH ? best : null;
}

// ===== ユーティリティ =====
function affiNorm(s) {
  if (!s) return 'その他';
  if (s.includes('気象庁')) return '気象庁';
  if (s.includes('防災')) return '防災科研';
  if (s.includes('地方')) return '地方公共団体';
  return 'その他';
}

const MAJOR_MAP = [
  [['石狩','渡島','檜山','後志','空知','上川','留萌','宗谷','網走','北見','紋別','胆振','日高','十勝','釧路','根室','北海道'], '北海道'],
  [['青森','岩手','宮城','秋田','山形','福島'], '東北'],
  [['茨城','栃木','群馬','埼玉','千葉','東京','神奈川','山梨','長野'], '関東・甲信'],
  [['新潟','富山','石川','福井'], '北陸'],
  [['岐阜','静岡','愛知','三重'], '東海'],
  [['滋賀','京都','大阪','兵庫','奈良','和歌山'], '近畿'],
  [['鳥取','島根','岡山','広島','山口'], '中国'],
  [['徳島','香川','愛媛','高知'], '四国'],

  [['沖縄'], '沖縄'],
];
function getMajor(r) {
  for (const [keys, label] of MAJOR_MAP) {
    for (const k of keys) { if (r.includes(k)) return label; }
  }
  return 'その他';
}

function fmtStart(s) {
  if (!s) return '—';
  const str = String(s);
  if (str.length >= 8) return str.slice(0,4) + '/' + str.slice(4,6) + '/' + str.slice(6,8);
  if (str.length === 4) return str;
  return '—';
}

const map = L.map('map',{center:[36.5,137],zoom:5,preferCanvas:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'
}).addTo(map);

let DATA = [];
let markers = [];
let markerLayer = L.layerGroup().addTo(map);
let sortKey='name', sortDir=1;
let activeAffi = new Set(['気象庁','防災科研','地方公共団体','その他']);
let filtered = [];
let selectedI = null;
let prevSelectedMarker = null;

// ===== データ構築 =====
function buildData(gistData) {
  const result = [];

  // 気象庁（JMA.txtから高精度座標）
  for (const [region, name, address, lat, lon, start] of JMA_DATA) {
    result.push({ region, name, address, lat, lon, start, affi:'気象庁', major:getMajor(region) });
  }

  // 東南海海底震度計（気象庁）
  for (const [region, name, address, lat, lon, start] of TONANKAI_DATA) {
    result.push({ region, name, address, lat, lon, start, affi:'気象庁', major:getMajor('東海') });
  }

  // 海底地震計（静的データ）
  for (const [network, code, lat, lon, depth] of KAITEITEN_DATA) {
    result.push({
      region: network, name: code,
      address: `水深 ${depth.toLocaleString()}m`,
      lat, lon, start: 0, affi: '防災科研', major: getMajor('') 
    });
  }

  // 防災科研・地方公共団体（Gistから、NIEDで座標補正）
  if (gistData && Array.isArray(gistData)) {
    for (const d of gistData) {
      const af = affiNorm(d.affi);
      if (af === '気象庁') continue;
      const region = d.area?.name || '';
      let lat = parseFloat(d.lat);
      let lon = parseFloat(d.lon);
      if (isNaN(lat) || isNaN(lon)) continue;
      if (af === '防災科研') {
        const hit = niefindNearest(lat, lon);
        if (hit) { lat = hit[0]; lon = hit[1]; }
      }
      result.push({
        region, name: d.name || '',
        address: d.address || d.city?.name || '',
        lat, lon, start: 0, affi: af, major: getMajor(region)
      });
    }
  }
  return result;
}

function countAffi() {
  document.getElementById('total').textContent = DATA.length.toLocaleString();
}

// ===== コントロール状態 =====
let displayFilter = 'all';   // 'all' | 'surface' | 'seafloor'
let majorFilter = '';

// ===== フィルタ =====
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return DATA.filter(d =>
    activeAffi.has(d.affi) &&
    (!q || d.name.toLowerCase().includes(q) || d.region.toLowerCase().includes(q)) &&
    (!majorFilter || d.major === majorFilter) &&
    (sortKey !== 'start' || d.start > 0) &&
    (displayFilter === 'all' ||
     (displayFilter === 'seafloor' && d.region.match(/S-net|DONET|N-net|相模湾|東南海/)) ||
     (displayFilter === 'surface'  && !d.region.match(/S-net|DONET|N-net|相模湾|東南海/)))
  );
}

// ===== 仮想スクロール =====
const ROW_H = 42;
let vsTotal = 0, vsOffset = 0, vsVisible = 0;
const VS_BUFFER = 8;
const tbody = document.getElementById('tbody');

function buildRows(start, end) {
  const frag = [];
  for (let i = start; i < end; i++) {
    const d = filtered[i];
    const color = COLORS[d.affi] || COLORS['その他'];
    const afClass = d.affi==='気象庁'?'af-jma':d.affi==='防災科研'?'af-nied':d.affi==='地方公共団体'?'af-local':'';
    const afShort = d.affi==='地方公共団体'?'地方':d.affi;
    const sel = selectedI===i?' selected':'';
    frag.push(
      `<div class="trow${sel}" onclick="selectSt(${i})" data-i="${i}" style="position:absolute;top:${(i-start)*ROW_H}px;left:0;right:0">` +
      `<svg width="12" height="12" style="flex-shrink:0"><circle cx="6" cy="6" r="4" fill="${color}"/></svg>` +
      `<div style="overflow:hidden"><div class="tname" title="${d.name}">${d.name}</div>` +
      `<div class="tregion" title="${d.region}">${d.region}</div></div>` +
      `<div class="tcoord">${d.lat.toFixed(2)}</div>` +
      `<div class="tcoord">${d.lon.toFixed(2)}</div>` +
      `<div class="taffi ${afClass}">${afShort}</div>` +
      `<div class="tstart">${d.start ? fmtStart(d.start) : '—'}</div></div>`
    );
  }
  return frag.join('');
}

function vsUpdate(scrollTop) {
  const first = Math.max(0, Math.floor(scrollTop / ROW_H) - VS_BUFFER);
  const last  = Math.min(vsTotal, first + vsVisible + VS_BUFFER * 2);
  if (first === vsOffset && tbody.querySelector('.trow')) return;
  vsOffset = first;
  const inner = tbody.querySelector('.vs-inner');
  inner.style.transform = `translateY(${first * ROW_H}px)`;
  inner.innerHTML = buildRows(first, last);
}

// ===== マーカー描画 =====
function renderMarkers() {
  markerLayer.clearLayers();
  prevSelectedMarker = null;
  markers = [];
  const layers = filtered.map((d, i) => {
    const color = COLORS[d.affi] || COLORS['その他'];
    const m = L.circleMarker([d.lat, d.lon], {
      ...STYLE_DEFAULT, color: 'rgba(0,0,0,0.3)', fillColor: color
    });
    m.on('click', () => selectSt(i));
    markers.push(m);
    return m;
  });
  if (layers.length) {
    const lg = L.layerGroup(layers);
    lg.eachLayer(l => markerLayer.addLayer(l));
  }
}

// ===== メイン描画 =====
function render() {
  filtered = getFiltered();
  filtered.sort((a,b) => {
    const va = a[sortKey] ?? (sortKey==='start'?0:''), vb = b[sortKey] ?? (sortKey==='start'?0:'');
    return typeof va==='string' ? va.localeCompare(vb,'ja')*sortDir : (va-vb)*sortDir;
  });
  document.getElementById('cnt').textContent = filtered.length.toLocaleString();
  vsTotal = filtered.length;
  vsVisible = Math.ceil(tbody.clientHeight / ROW_H) + 1;
  if (!vsTotal) {
    tbody.innerHTML = '<div class="no-result">該当なし</div>';
  } else {
    tbody.innerHTML =
      `<div class="vs-spacer" style="position:relative;height:${vsTotal*ROW_H}px">` +
      `<div class="vs-inner"></div></div>`;
    vsOffset = -1;
    vsUpdate(tbody.scrollTop);
  }
  renderMarkers();
  updateSort();
}

function buildPopup(d) {
  const color = COLORS[d.affi] || COLORS['その他'];
  const afLabel = d.affi==='地方公共団体'?'地方公共団体':d.affi;
  const startStr = d.start ? fmtStart(d.start) : '—';
  return `<div class="pop-name" style="color:${color}">${d.name}</div>` +
    `<div class="pop-region">${d.region}</div>` +
    `<div class="pop-addr">${d.address||''}</div>` +
    `<div class="pop-coord">緯度 ${d.lat.toFixed(2)} / 経度 ${d.lon.toFixed(2)}</div>` +
    `<div class="pop-coord">設置時期: ${startStr}</div>` +
    `<div class="pop-affi" style="color:${color};border-color:${color}">${afLabel}</div>`;
}

// ===== 選択 =====
function selectSt(i) {
  const d = filtered[i];
  if (!d) return;
  if (prevSelectedMarker !== null && selectedI !== null && filtered[selectedI]) {
    const c = COLORS[filtered[selectedI].affi] || COLORS['その他'];
    prevSelectedMarker.setStyle({radius:4, color:'rgba(0,0,0,0.3)', weight:1, fillColor:c, fillOpacity:0.9});
  }
  selectedI = i;
  const m = markers[i];
  if (!m) return;
  m.setStyle(STYLE_SEL);
  prevSelectedMarker = m;
  if (!m._popup) m.bindPopup(buildPopup(d), {maxWidth:240});
  map.setView([d.lat, d.lon], Math.max(map.getZoom(), 9), {animate:true});
  m.openPopup();
  tbody.querySelectorAll('.trow').forEach(el => {
    el.classList.toggle('selected', +el.dataset.i === i);
  });
  const targetTop = i * ROW_H;
  const scrollTop = tbody.scrollTop;
  const clientH   = tbody.clientHeight;
  if (targetTop < scrollTop || targetTop + ROW_H > scrollTop + clientH) {
    tbody.scrollTop = targetTop - clientH / 2;
  }
}

// ===== コントロールUI =====
function onSortKeyChange(k) {
  const prev = sortKey;
  sortKey = k;
  selectedI=null; prevSelectedMarker=null;
  if (k === 'start' || prev === 'start') render(); else reSort();
}

function onSortDirToggle() {
  sortDir *= -1;
  selectedI=null; prevSelectedMarker=null;
  document.getElementById('sub-dir').textContent = sortDir > 0 ? '↑ 昇順' : '↓ 降順';
  reSort();
}

function onMajorChange(val) {
  majorFilter = val;
  selectedI=null; prevSelectedMarker=null;
  render();
}

function onDisplayChange(val) {
  displayFilter = val;
  selectedI=null; prevSelectedMarker=null;
  render();
}

// ソートのみ再実行（マーカー再描画なし）
// ※ filtered を並び替えた後、markers も同じ順序で並び替えて対応を保つ
function reSort() {
  // filtered と markers を同時に並び替え（対応を維持）
  const paired = filtered.map((d, i) => [d, markers[i]]);
  paired.sort(([a], [b]) => {
    const va = a[sortKey] ?? (sortKey==='start'?0:''), vb = b[sortKey] ?? (sortKey==='start'?0:'');
    return typeof va==='string' ? va.localeCompare(vb,'ja')*sortDir : (va-vb)*sortDir;
  });
  filtered = paired.map(([d]) => d);
  markers  = paired.map(([, m]) => m);

  // マーカーのclickハンドラを新インデックスで付け直す
  markers.forEach((m, i) => {
    m.off('click');
    m.on('click', () => selectSt(i));
    if (m._popup) { m.unbindPopup(); }  // ポップアップキャッシュをクリア
  });

  document.getElementById('cnt').textContent = filtered.length.toLocaleString();
  vsTotal = filtered.length;
  vsVisible = Math.ceil(tbody.clientHeight / ROW_H) + 1;
  tbody.innerHTML =
    `<div class="vs-spacer" style="position:relative;height:${vsTotal*ROW_H}px">` +
    `<div class="vs-inner"></div></div>`;
  vsOffset = -1;
  vsUpdate(tbody.scrollTop);
  updateSort();
}

function updateSort() {
  const keyEl = document.getElementById('sort-key');
  if (keyEl) keyEl.value = sortKey;
  const dirEl = document.getElementById('sub-dir');
  if (dirEl) dirEl.textContent = sortDir > 0 ? '↑ 昇順' : '↓ 降順';
}

function toggleAffi(af) {
  if(activeAffi.has(af)) activeAffi.delete(af); else activeAffi.add(af);
  document.getElementById('b-jma').classList.toggle('off',!activeAffi.has('気象庁'));
  document.getElementById('b-nied').classList.toggle('off',!activeAffi.has('防災科研'));
  document.getElementById('b-local').classList.toggle('off',!activeAffi.has('地方公共団体'));
  selectedI=null; prevSelectedMarker=null;
  render();
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); };
}

tbody.addEventListener('scroll', () => {
  if (tbody.querySelector('.vs-spacer')) vsUpdate(tbody.scrollTop);
}, {passive:true});

document.getElementById('search').addEventListener('input', debounce(()=>{selectedI=null;prevSelectedMarker=null;render();}, 180));


// ===== fetch =====
const GIST_URL = 'https://gist.githubusercontent.com/iku55/79005d1896631ad6117bbe327b8162c1/raw/stations.json';
fetch(GIST_URL)
  .then(r => r.ok ? r.json() : null)
  .then(gistData => {
    DATA = buildData(gistData);
    countAffi();
    render();
  })
  .catch(() => {
    DATA = buildData(null);
    countAffi();
    render();
  });
</script>
</body>
</html>
