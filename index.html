<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>震度観測点マップ｜気象庁・防災科研・地方公共団体</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;--border:#30363d;
  --accent:#58a6ff;--jma:#58a6ff;--nied:#3fb950;--local:#f78166;--unknown:#8b949e;
  --text:#e6edf3;--muted:#8b949e;--font:'BIZ UDGothic','Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ヘッダー */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;z-index:1000}
.logo{font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:.03em}
.logo small{color:var(--muted);font-weight:400;font-size:11px;margin-left:6px}
.controls{display:flex;gap:6px;flex:1;flex-wrap:wrap;align-items:center}
input[type=text],select{background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
input[type=text]{flex:1;min-width:150px}
input[type=text]:focus,select:focus{border-color:var(--accent)}
select{cursor:pointer}
.badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid;white-space:nowrap;cursor:pointer;transition:opacity .15s;user-select:none}
.badge.off{opacity:.35}
.badge-jma{color:var(--jma);border-color:var(--jma);background:rgba(88,166,255,.08)}
.badge-nied{color:var(--nied);border-color:var(--nied);background:rgba(63,185,80,.08)}
.badge-local{color:var(--local);border-color:var(--local);background:rgba(247,129,102,.08)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-jma{background:var(--jma)}
.dot-nied{background:var(--nied)}
.dot-local{background:var(--local)}
.cnt-wrap{font-size:12px;color:var(--muted);white-space:nowrap;padding:4px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:14px}
.cnt-wrap b{color:var(--text)}

/* レイアウト */
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:#0d1117}

/* パネル */
.panel{width:400px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surf);overflow:hidden}
.panel-head{background:var(--surf2);border-bottom:1px solid var(--border)}
.panel-head table{width:100%;border-collapse:collapse}
.panel-head th{padding:8px 8px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;cursor:pointer;user-select:none;white-space:nowrap;letter-spacing:.04em}
.panel-head th:hover{color:var(--text)}
.panel-head th.active{color:var(--accent)}
.table-body{overflow-y:auto;flex:1}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.trow{display:grid;grid-template-columns:16px 1fr 56px 60px 44px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer;gap:4px;font-size:12px;transition:background .1s}
.trow:hover{background:var(--surf2)}
.trow.selected{background:#1c2d3a;border-left:3px solid var(--accent)}
.trow .tname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.trow .tregion{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:10px;grid-column:2;margin-top:-2px}
.trow .tcoord{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);text-align:right}
.trow .taffi{font-size:10px;text-align:center;padding:1px 4px;border-radius:3px;white-space:nowrap}
.af-jma{color:var(--jma)}
.af-nied{color:var(--nied)}
.af-local{color:var(--local)}
.trow-inner{display:contents}
.no-result{display:flex;align-items:center;justify-content:center;height:100px;color:var(--muted);font-size:13px}

/* ポップアップ */
.leaflet-popup-content-wrapper{background:var(--surf);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);color:var(--text)}
.leaflet-popup-tip{background:var(--surf)}
.leaflet-popup-content{margin:12px 14px;min-width:190px}
.pop-name{font-size:13px;font-weight:700;margin-bottom:2px}
.pop-region{font-size:11px;color:var(--muted);margin-bottom:6px}
.pop-addr{font-size:11px;line-height:1.5;color:var(--text)}
.pop-coord{font-size:10px;color:var(--muted);margin-top:5px;font-family:monospace}
.pop-affi{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-top:5px;border:1px solid}
</style>
</head>

<header>
  <div class="logo">震度観測点マップ<small>気象庁 / 防災科研 / 地方公共団体</small></div>

    <div class="badge badge-local" onclick="toggleAffi('地方公共団体')" id="b-local"><div class="dot dot-local"></div>地方公共団体 <span id="c-local">0</span></div>

  <div class="cnt-wrap">表示 <b id="cnt">0</b> / <b id="total">0</b> 件</div>
</header>

<div class="main">
  <div id="map"></div>

    </div>

  </div>
</div>

const COLORS = {'気象庁':'#58a6ff','防災科研':'#3fb950','地方公共団体':'#f78166','その他':'#8b949e'};

function affiNorm(s) {
  if (!s) return 'その他';
  if (s.includes('気象庁')) return '気象庁';
  if (s.includes('防災')) return '防災科研';
  if (s.includes('地方')) return '地方公共団体';
  return 'その他';
}

function getMajor(r) {
  if (['石狩','渡島','檜山','後志','空知','上川','留萌','宗谷','網走','北見','紋別','胆振','日高','十勝','釧路','根室','北海道'].some(x=>r.includes(x))) return '北海道';
  if (['青森','岩手','宮城','秋田','山形','福島'].some(x=>r.includes(x))) return '東北';
  if (['茨城','栃木','群馬','埼玉','千葉','東京','神奈川','山梨','長野'].some(x=>r.includes(x))) return '関東・甲信';
  if (['新潟','富山','石川','福井'].some(x=>r.includes(x))) return '北陸';
  if (['岐阜','静岡','愛知','三重'].some(x=>r.includes(x))) return '東海';
  if (['滋賀','京都','大阪','兵庫','奈良','和歌山'].some(x=>r.includes(x))) return '近畿';
  if (['鳥取','島根','岡山','広島','山口'].some(x=>r.includes(x))) return '中国';
  if (['徳島','香川','愛媛','高知'].some(x=>r.includes(x))) return '四国';
  if (['福岡','佐賀','長崎','熊本','大分','宮崎','鹿児島'].some(x=>r.includes(x))) return '九州';
  if (r.includes('沖縄')) return '沖縄';
  return 'その他';
}

const map = L.map('map',{center:[36.5,137],zoom:5,preferCanvas:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'
}).addTo(map);

let DATA = [];
let markers = [];
let markerLayer = L.layerGroup().addTo(map);
let sortKey='name', sortDir=1;
let activeAffi = new Set(['気象庁','防災科研','地方公共団体','その他']);
let filtered = [];
let selectedI = null;

function buildData(jmaRaw, gistData) {
  const jma = jmaRaw.map(r => ({region:JMA_REGIONS[r[0]],name:r[1],lat:r[2],lon:r[3],address:r[4],affi:'気象庁',major:getMajor(JMA_REGIONS[r[0]])}));

  if (!gistData || !Array.isArray(gistData)) return jma;

  
  const extras = [];
  for (const d of gistData) {
    const af = affiNorm(d.affi);
    if (af === '気象庁') continue; 
    const region = d.area?.name || '';
    const name = d.name || '';
    const lat = parseFloat(d.lat);
    const lon = parseFloat(d.lon);
    if (isNaN(lat) || isNaN(lon)) continue;
    extras.push({
      region, name, lat, lon,
      address: d.city?.name || '',
      affi: af,
      major: getMajor(region),
      code: d.code || ''
    });
  }
  return [...jma, ...extras];
}

function countAffi() {
  const c = {'気象庁':0,'防災科研':0,'地方公共団体':0};
  for (const d of DATA) if (c[d.affi]!==undefined) c[d.affi]++;
  document.getElementById('c-jma').textContent = c['気象庁'].toLocaleString();
  document.getElementById('c-nied').textContent = c['防災科研'].toLocaleString();
  document.getElementById('c-local').textContent = c['地方公共団体'].toLocaleString();
  document.getElementById('total').textContent = DATA.length.toLocaleString();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const mj = document.getElementById('major').value;
  return DATA.filter(d =>
    activeAffi.has(d.affi) &&
    (!q || d.name.toLowerCase().includes(q) || d.region.toLowerCase().includes(q)) &&
    (!mj || d.major === mj)
  );
}

function render() {
  filtered = getFiltered();
  filtered.sort((a,b)=>{
    let va=a[sortKey]??'', vb=b[sortKey]??'';
    return typeof va==='string' ? va.localeCompare(vb,'ja')*sortDir : (va-vb)*sortDir;
  });

  document.getElementById('cnt').textContent = filtered.length.toLocaleString();

  
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML='<div class="no-result">該当なし</div>';
  } else {
    const rows = filtered.map((d,i)=>{
      const color = COLORS[d.affi]||COLORS['その他'];
      const afClass = d.affi==='気象庁'?'af-jma':d.affi==='防災科研'?'af-nied':d.affi==='地方公共団体'?'af-local':'';
      const sel = selectedI===i?'selected':'';
      return `<div class="trow ${sel}" onclick="selectSt(${i})" data-i="${i}">
        <svg width="12" height="12" style="flex-shrink:0"><circle cx="6" cy="6" r="4" fill="${color}"/></svg>
        <div style="overflow:hidden">
          <div class="tname" title="${d.name}">${d.name}</div>
          <div class="tregion" title="${d.region}">${d.region}</div>
        </div>
        <div class="tcoord">${d.lat.toFixed(3)}</div>
        <div class="tcoord">${d.lon.toFixed(3)}</div>
        <div class="taffi ${afClass}">${d.affi==='地方公共団体'?'地方':d.affi==='防災科研'?'防災科研':d.affi}</div>
      </div>`;
    }).join('');
    tbody.innerHTML = rows;
  }

  
  markerLayer.clearLayers();
  markers = filtered.map((d,i)=>{
    const color = COLORS[d.affi]||COLORS['その他'];
    const m = L.circleMarker([d.lat,d.lon],{radius:5,color:'rgba(0,0,0,0.4)',weight:1,fillColor:color,fillOpacity:1})
      .bindPopup(buildPopup(d),{maxWidth:240})
      .on('click',()=>selectSt(i));
    markerLayer.addLayer(m);
    return m;
  });

  updateSort();
}

function buildPopup(d) {
  const color = COLORS[d.affi]||COLORS['その他'];
  const afLabel = d.affi==='地方公共団体'?'地方公共団体':d.affi;
  return `<div class="pop-name" style="color:${color}">${d.name}</div>
    <div class="pop-region">${d.region}</div>
    <div class="pop-addr">${d.address||''}</div>
    <div class="pop-coord">緯度 ${d.lat.toFixed(4)} / 経度 ${d.lon.toFixed(4)}</div>
    <div class="pop-affi" style="color:${color};border-color:${color}">${afLabel}</div>`;
}

function selectSt(i) {
  selectedI = i;
  const d = filtered[i];
  if (!d) return;
  const color = COLORS[d.affi]||COLORS['その他'];
  markers.forEach((m,j)=>{
    const c = COLORS[filtered[j].affi]||COLORS['その他'];
    m.setStyle(j===i
      ? {radius:7,fillColor:'#ffa657',color:'#fff',weight:1.5,fillOpacity:1}
      : {radius:5,fillColor:c,color:'rgba(0,0,0,0.4)',weight:1,fillOpacity:1});
  });
  map.setView([d.lat,d.lon], Math.max(map.getZoom(),11),{animate:true});
  markers[i].openPopup();
  document.querySelectorAll('.trow').forEach((el,j)=>{
    el.classList.toggle('selected',j===i);
    if(j===i) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}

function sortBy(k) {
  if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=1;}
  selectedI=null;
  render();
}

function updateSort() {
  const labels = {name:'観測点名',lat:'緯度',lon:'経度',affi:'機関'};
  ['name','lat','lon','affi'].forEach(k=>{
    const el=document.getElementById('h-'+k);
    if(!el) return;
    el.classList.toggle('active',sortKey===k);
    el.textContent=labels[k]+(sortKey===k?(sortDir>0?' ↑':' ↓'):' ↕');
  });
}

function toggleAffi(af) {
  if(activeAffi.has(af)) activeAffi.delete(af); else activeAffi.add(af);
  document.getElementById('b-jma').classList.toggle('off',!activeAffi.has('気象庁'));
  document.getElementById('b-nied').classList.toggle('off',!activeAffi.has('防災科研'));
  document.getElementById('b-local').classList.toggle('off',!activeAffi.has('地方公共団体'));
  selectedI=null;
  render();
}

document.getElementById('search').addEventListener('input',()=>{selectedI=null;render();});
document.getElementById('major').addEventListener('change',()=>{selectedI=null;render();});

const GIST_URL = 'https://gist.githubusercontent.com/iku55/79005d1896631ad6117bbe327b8162c1/raw/stations.json';
fetch(GIST_URL)
  .then(r => {
    if (!r.ok) throw new Error('fetch failed');
    return r.json();
  })
  .then(gistData => {
        DATA = buildData(JMA_RAW, gistData);
    countAffi();
    render();
  })
  .catch(err => {
    
    console.warn('Gist fetch failed, using JMA data only:', err);
        DATA = buildData(JMA_RAW, null);
    countAffi();
    render();
  });
</script>
</body>
</html>
